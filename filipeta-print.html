<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
    <title>Filipeta Impressa</title>
    <style>
        @page {
            size: 80mm 220mm;
            margin: 0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 70mm;
            margin: 5mm;
            font-family: Arial, Helvetica, sans-serif;
            color: #000;
            background: #fff;
        }

        .bloco-saudacao {
            height: 1.5cm;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-bottom: 1px dashed #000;
            padding-bottom: 2mm;
        }
        .saudacao-nome {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .saudacao-cpf {
            font-size: 9px;
            margin-top: 1mm;
        }

        .bloco-logo {
            height: 5cm;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2mm 0;
        }
        .bloco-logo img {
            max-height: 4.5cm;
            max-width: 68mm;
            object-fit: contain;
        }

        .bloco-empresa {
            height: 1cm;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 1px dashed #000;
            padding-bottom: 1mm;
        }

        .bloco-produto {
            height: 2cm;
            border: 1px solid #000;
            border-radius: 2px;
            padding: 1.5mm 2mm;
            margin-bottom: 2mm;
            position: relative;
            overflow: hidden;
        }
        .bloco-produto:last-of-type {
            margin-bottom: 0;
        }
        .produto-nome {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
            overflow: hidden;
            width: 100%;
            padding-right: 18mm;
            box-sizing: border-box;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            word-break: break-word;
        }
        .produto-ean {
            font-size: 8px;
            font-family: 'Courier New', monospace;
            margin-top: 0.5mm;
        }
        .produto-preco-de {
            font-size: 9px;
            text-decoration: line-through;
            position: absolute;
            bottom: 11mm;
            right: 2mm;
            text-align: right;
            color: #000;
        }
        .produto-preco-por {
            position: absolute;
            bottom: 1.5mm;
            right: 2mm;
            background-color: #000 !important;
            color: #fff !important;
            font-weight: 900;
            font-size: 16px;
            padding: 1mm 3mm;
            border: none;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .produto-validade {
            font-size: 7px;
            font-style: italic;
            margin-top: 0.5mm;
        }

        .bloco-desconto {
            text-align: center;
            border: 1px solid #000;
            padding: 2mm;
            margin-top: 3mm;
            margin-bottom: 2mm;
        }
        .desconto-titulo {
            font-size: 7px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 1mm;
            white-space: nowrap;
            background-color: #000 !important;
            color: #fff !important;
            padding: 1mm 2mm;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .desconto-item {
            font-size: 10px;
            line-height: 1.5;
        }

        .bloco-footer {
            height: 1.5cm;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-top: 1px dashed #000;
            margin-top: 3mm;
            padding-top: 2mm;
        }
        .footer-instagram {
            font-size: 11px;
            font-weight: 700;
        }
        .footer-data {
            font-size: 8px;
            margin-top: 1mm;
        }
    </style>
</head>
<body>
    <div class="bloco-saudacao" id="blocoSaudacao">
        <div class="saudacao-nome" id="saudacaoNome">SEJA BEM VINDO</div>
        <div class="saudacao-cpf" id="saudacaoCpf"></div>
    </div>

    <div class="bloco-logo" id="blocoLogo"></div>

    <div class="bloco-empresa" id="blocoEmpresa"></div>

    <div id="blocoProdutos"></div>

    <div class="bloco-footer">
        <div class="footer-instagram" id="footerInstagram"></div>
        <div class="footer-data" id="footerData"></div>
    </div>

    <script>
        function formatarCpf(cpf) {
            const d = String(cpf).replace(/\D/g, '');
            if (d.length === 11) {
                return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            }
            return d;
        }

        function formatarMoeda(valor) {
            const num = parseFloat(valor);
            if (isNaN(num)) return 'R$ 0,00';
            return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        window.printAPI.onDadosFilipeta(function(data) {
            console.log('Dados recebidos para impressao:', data);

            // Bloco 1: Saudacao
            document.getElementById('saudacaoNome').textContent = 'SEJA BEM VINDO ' + (data.nomeCliente || 'CLIENTE');
            document.getElementById('saudacaoCpf').textContent = 'CPF: ' + formatarCpf(data.cpf);

            // Bloco 2: Logo
            if (data.logoBase64) {
                var img = document.createElement('img');
                img.onload = function() {
                    renderizarRestante(data);
                };
                img.onerror = function() {
                    renderizarRestante(data);
                };
                img.src = data.logoBase64;
                document.getElementById('blocoLogo').appendChild(img);
            } else {
                renderizarRestante(data);
            }
        });

        function renderizarRestante(data) {
            // Bloco 3: Empresa
            document.getElementById('blocoEmpresa').textContent = data.tenantName || '';

            // Blocos 4-8: Produtos
            var container = document.getElementById('blocoProdutos');
            container.innerHTML = '';

            var produtos = data.produtos || [];
            for (var i = 0; i < produtos.length; i++) {
                var p = produtos[i];
                var div = document.createElement('div');
                div.className = 'bloco-produto';

                var nomeEl = document.createElement('div');
                nomeEl.className = 'produto-nome';
                nomeEl.textContent = p.nome || p.nome_produto || '';

                var eanEl = document.createElement('div');
                eanEl.className = 'produto-ean';
                eanEl.textContent = 'EAN ' + (p.ean || '');

                var temPreco = p.preco_de && p.preco_por
                    && parseFloat(p.preco_de) > 0 && parseFloat(p.preco_por) > 0;

                if (temPreco) {
                    var deEl = document.createElement('div');
                    deEl.className = 'produto-preco-de';
                    deEl.textContent = 'DE ' + formatarMoeda(p.preco_de);
                    div.appendChild(nomeEl);
                    div.appendChild(eanEl);
                    div.appendChild(deEl);

                    var porEl = document.createElement('div');
                    porEl.className = 'produto-preco-por';
                    porEl.textContent = 'POR ' + formatarMoeda(p.preco_por);
                    div.appendChild(porEl);
                } else {
                    div.appendChild(nomeEl);
                    div.appendChild(eanEl);

                    var offEl = document.createElement('div');
                    offEl.className = 'produto-preco-por';
                    offEl.textContent = '5% OFF';
                    div.appendChild(offEl);
                }

                var valEl = document.createElement('div');
                valEl.className = 'produto-validade';
                valEl.textContent = 'Valido ate ' + (data.validoAte || '');
                div.appendChild(valEl);

                container.appendChild(div);
            }

            // Bloco desconto progressivo
            var descontoDiv = document.createElement('div');
            descontoDiv.className = 'bloco-desconto';
            descontoDiv.innerHTML =
                '<div class="desconto-titulo">SUA LISTA TEM DESCONTO PROGRESSIVO ATIVO NO PIX</div>' +
                '<div class="desconto-item">2 itens \u2192 2% OFF</div>' +
                '<div class="desconto-item">3 itens \u2192 3% OFF</div>' +
                '<div class="desconto-item">Todos os itens \u2192 5% OFF</div>';
            container.appendChild(descontoDiv);

            // Bloco 9: Footer
            document.getElementById('footerInstagram').textContent = data.tenantInstagram || '';
            document.getElementById('footerData').textContent = 'Impresso em ' + (data.impressoEm || '');

            // Sinalizar pronto para impressao
            setTimeout(function() {
                window.printAPI.printReady();
            }, 500);
        }
    </script>
</body>
</html>

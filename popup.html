<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uso Contínuo - Filipeta</title>
<style>
  /* Paleta neuro-UX:
     - Fundo frio (navy/indigo) = segurança, baixa fadiga, foco no conteúdo
     - Acento frio (azul) = guia de leitura, atenção sem "agressão"
     - CTA quente (vermelho/laranja) = abordagem/ação (desejo)
     - Urgência âmbar = rappel suave
     - Sucesso verde = reforço dopaminérgico
  */

  *{margin:0;padding:0;box-sizing:border-box}

  body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* Navy → Indigo com vinhetas suaves; dirige o olhar ao centro */
    background:
      radial-gradient(1200px 800px at 10% -10%, #16234d 0%, transparent 60%),
      radial-gradient(1000px 700px at 110% 10%, #1b2c5c 0%, transparent 65%),
      linear-gradient(135deg, #0b1020 0%, #0f1a37 100%);
    color:#e9efff; /* texto geral sobre fundo escuro */
    overflow:hidden;width:100vw;height:100vh;position:relative;
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  }

  .container{padding:15px;height:100%;display:flex;flex-direction:column}

  .header{text-align:center;margin-bottom:15px}

  .saudacao{
    color:#eef2ff;
    font-size:16px;font-weight:700;margin-bottom:12px;
    text-shadow:0 0 18px rgba(96,165,250,.18);
	/* ANIMAÇÃO PISCANDO ADICIONADA */
	animation: piscar 1.5s ease-in-out infinite;
  }
  /* KEYFRAMES PARA O EFEITO PISCANDO */
@keyframes piscar {
    0% { 
        opacity: 1; 
        text-shadow: 0 0 18px rgba(96,165,250,.18);
    }
    50% { 
        opacity: 0.3; 
        text-shadow: 0 0 8px rgba(96,165,250,.1);
    }
    100% { 
        opacity: 1; 
        text-shadow: 0 0 18px rgba(96,165,250,.18);
    }
}

  .instrucao{
    /* cartão claro para legibilidade (texto escuro) */
    background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.90));
    padding:12px;border-radius:10px;font-size:14px;font-weight:600;color:#2c3e50;
    box-shadow:0 6px 18px rgba(2,6,23,.35), 0 0 0 1px rgba(255,255,255,.12) inset;
  }

  .produtos-container{
    flex:1;
    background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.94));
    border-radius:12px;margin:15px 0;padding:15px;
    /* MELHORIAS DE SCROLL */
    overflow-y:auto;
    overflow-x:hidden;
    max-height:calc(100vh - 200px);
    scroll-behavior:smooth;
    box-shadow:0 10px 26px rgba(2,6,23,.35);
    position:relative;
  }

  .produto-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px;margin-bottom:10px;background:#ffffff;border-radius:12px;
    /* Acento frio guia a leitura (não disputa com CTA) */
    border-left:4px solid #3b82f6;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    flex-shrink:0; /* Evitar compressão dos itens */
  }
  .produto-item:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 18px rgba(0,0,0,.14);
    border-left-color:#22c55e; /* microrecompensa visual ao hover */
  }

  .produto-info{
    flex:1;
    min-width:0; /* Permitir quebra de texto */
  }

  .produto-nome{
    font-size:13px;font-weight:800;color:#1f2937;margin-bottom:6px;
    cursor:pointer;padding:4px 6px;border-radius:8px;
    transition:background-color .18s ease, color .18s ease;
    word-wrap:break-word; /* Quebrar palavras longas */
    line-height:1.3;
  }
  .produto-nome:hover{
    background-color:rgba(99,102,241,.12); /* indigo sutil */
    color:#0ea5e9; /* ciano = foco */
  }

  .produto-ean{
    font-size:11px;color:#64748b;font-family:'Courier New', monospace;
    cursor:pointer;padding:4px 6px;border-radius:8px;
    transition:background-color .18s ease, color .18s ease;
    word-break:break-all; /* Quebrar códigos longos */
  }
  .produto-ean:hover{
    background-color:rgba(15,23,42,.08);
    color:#334155;
  }

  .dias-sem-compra{
    /* Urgência suave em âmbar */
    background:linear-gradient(180deg, #f59e0b, #b45309);
    color:#1b1302;padding:6px 12px;border-radius:18px;
    font-size:12px;font-weight:900;min-width:55px;text-align:center;
    box-shadow:0 8px 18px rgba(245,158,11,.35), inset 0 -2px 0 rgba(0,0,0,.12);
    flex-shrink:0; /* Não comprimir o badge */
  }
  .dias-sem-compra.urgente{
    background:linear-gradient(180deg, #f97316, #c2410c);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

  .footer{display:flex;justify-content:space-between;align-items:center;margin-top:15px}

  .debug-info{color:#dbeafe;font-size:10px;font-family:monospace;opacity:.9}

  .botoes{display:flex;gap:10px}

  .btn-fechar{
    /* CTA quente: chama ação/desejo */
    background:linear-gradient(180deg, #ff5a3d, #e14b30);
    color:#fff;border:none;padding:12px 24px;border-radius:28px;cursor:pointer;
    font-size:13px;font-weight:900;letter-spacing:.3px;
    box-shadow:0 12px 28px rgba(225,75,48,.35), inset 0 1px 0 rgba(255,255,255,.18);
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
  }
  .btn-fechar:hover{transform:translateY(-1px);filter:brightness(1.05)}
  .btn-fechar:active{transform:translateY(0);filter:brightness(.98)}

  .btn-debug{
    background:linear-gradient(180deg, #60a5fa, #2563eb);
    color:#fff;border:none;padding:12px 18px;border-radius:22px;cursor:pointer;
    font-size:11px;font-weight:800;box-shadow:0 8px 18px rgba(37,99,235,.30);
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
  }
  .btn-debug:hover{transform:translateY(-1px);filter:brightness(1.05)}
  .btn-debug:active{transform:translateY(0);filter:brightness(.98)}

  .loading{display:flex;justify-content:center;align-items:center;flex:1;color:#475569;font-size:14px}
  .sem-dados{text-align:center;color:#475569;font-size:14px;padding:30px}

  .toast-copy{
    position:absolute;top:15px;right:15px;
    background:linear-gradient(180deg, #34d399, #059669); /* sucesso verde */
    color:#03120d;padding:8px 16px;border-radius:20px;
    font-size:12px;font-weight:900;opacity:0;transform:translateY(-10px);
    transition:all .28s ease;pointer-events:none;z-index:1000;
    box-shadow:0 12px 28px rgba(16,185,129,.35), inset 0 1px 0 rgba(255,255,255,.18);
  }
  .toast-copy.show{opacity:1;transform:translateY(0)}

  .close-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:transparent;z-index:-1}

  /* BARRA DE ROLAGEM MELHORADA E MAIS VISÍVEL */
  .produtos-container::-webkit-scrollbar{
    width:14px;
  }

  .produtos-container::-webkit-scrollbar-track{
    background:rgba(0,0,0,0.1);
    border-radius:7px;
    margin:8px 0;
  }

  .produtos-container::-webkit-scrollbar-thumb{
    background:linear-gradient(180deg, #3b82f6, #1e40af);
    border-radius:7px;
    border:2px solid rgba(255,255,255,0.2);
    min-height:40px;
  }

  .produtos-container::-webkit-scrollbar-thumb:hover{
    background:linear-gradient(180deg, #1e40af, #1e3a8a);
    border:2px solid rgba(255,255,255,0.3);
  }

  .produtos-container::-webkit-scrollbar-thumb:active{
    background:linear-gradient(180deg, #1e3a8a, #172554);
  }

  /* Para Firefox */
  .produtos-container{
    scrollbar-width:thin;
    scrollbar-color:#3b82f6 rgba(0,0,0,0.1);
  }

  /* Sombras para indicar conteúdo adicional quando há scroll */
  .produtos-container.has-scroll::before,
  .produtos-container.has-scroll::after{
    content:'';
    position:absolute;
    left:0;
    right:14px; /* Deixar espaço para scrollbar */
    height:15px;
    pointer-events:none;
    z-index:1;
  }

  .produtos-container.has-scroll::before{
    top:0;
    background:linear-gradient(to bottom, rgba(255,255,255,0.9), transparent);
  }

  .produtos-container.has-scroll::after{
    bottom:0;
    background:linear-gradient(to top, rgba(255,255,255,0.9), transparent);
  }
</style>

</head>
<body>
    <div class="close-overlay" id="closeOverlay"></div>
    <div class="container">
        <div class="header">
            <div class="saudacao" id="saudacao">Carregando...</div>
            <div class="instrucao">
                Seu cliente comprou este produto há <b>mais de 25 dias</b>.  
                Pergunte se deseja repor agora para <b>não interromper o tratamento</b>.
            </div>
        </div>
        
        <div class="produtos-container" id="produtosContainer">
            <div class="loading">Buscando produtos...</div>
        </div>
        
        <div class="footer">
            <div class="debug-info" id="debugInfo">ESC para fechar</div>
            <div class="botoes">
                <button class="btn-debug" id="btnDebug">Force</button>
                <button class="btn-fechar" id="btnFechar">Fechar</button>
            </div>
        </div>
        
        <div class="toast-copy" id="toastCopy">Copiado!</div>
    </div>

    <script>
        let cpfCliente = '';
        let nomeCliente = '';
        let tentativasFechamento = 0;
        let fechouComSucesso = false;

        function updateDebug(message) {
            const debugEl = document.getElementById('debugInfo');
            if (debugEl) {
                debugEl.textContent = message;
            }
            console.log(`DEBUG: ${message}`);
        }

        // FUNÇÃO DE DEBUG DE CACHE (NOVA)
        async function debugCache() {
            try {
                updateDebug('Verificando cache...');
                console.log('🔍 Verificando cache do popup');
                
                if (window.electronAPI && window.electronAPI.getCacheStatsPopup) {
                    const stats = await window.electronAPI.getCacheStatsPopup();
                    console.log('📊 Cache stats:', stats);
                    updateDebug(`Cache: ${stats.size} itens, ${Math.round(stats.totalMemory/1024)}KB`);
                    showToast(`Cache: ${stats.size} itens`);
                } else {
                    console.log('⚠️ Função de cache stats não disponível');
                    updateDebug('Cache stats não disponível');
                    showToast('Cache não disponível');
                }
                
            } catch (error) {
                console.error('❌ Erro ao verificar cache:', error);
                updateDebug(`Erro cache: ${error.message}`);
                showToast('Erro no cache');
            }
        }

        // FUNÇÃO DE FORCE FECHAMENTO (BACKUP)
        async function forcarFechamento() {
            if (fechouComSucesso) return;
            
            tentativasFechamento++;
            updateDebug(`Fechando (force) - Tentativa ${tentativasFechamento}`);
            
            try {
                if (window.electronAPI && window.electronAPI.fecharPopupUsoContinuo) {
                    console.log('🔴 Forçando fechamento do popup');
                    const result = await window.electronAPI.fecharPopupUsoContinuo();
                    console.log('Resultado do fechamento forçado:', result);
                    
                    if (result.success) {
                        fechouComSucesso = true;
                        updateDebug('Fechamento forçado bem-sucedido');
                    } else {
                        updateDebug(`Erro: ${result.error}`);
                    }
                } else {
                    updateDebug('API de fechamento não disponível');
                    console.error('electronAPI.fecharPopupUsoContinuo não disponível');
                }
            } catch (error) {
                console.error('❌ Erro ao forçar fechamento:', error);
                updateDebug(`Erro: ${error.message}`);
            }
        }

        // FUNÇÃO NORMAL DE FECHAMENTO
        async function fecharPopup(metodo = 'botao') {
            if (fechouComSucesso) return;
            
            tentativasFechamento++;
            updateDebug(`Fechando (${metodo}) - Tentativa ${tentativasFechamento}`);
            
            try {
                if (window.electronAPI && window.electronAPI.fecharPopupUsoContinuo) {
                    console.log(`Chamando fecharPopupUsoContinuo - método: ${metodo}`);
                    const result = await window.electronAPI.fecharPopupUsoContinuo();
                    console.log('Resultado do fechamento:', result);
                    
                    if (result.success) {
                        fechouComSucesso = true;
                        updateDebug('Fechamento bem-sucedido');
                    } else {
                        updateDebug(`Erro: ${result.error}`);
                    }
                } else {
                    updateDebug('API de fechamento não disponível');
                    console.error('electronAPI.fecharPopupUsoContinuo não disponível');
                }
            } catch (error) {
                console.error('Erro ao fechar popup:', error);
                updateDebug(`Erro: ${error.message}`);
            }
        }

        // Outras funções (saudação, cópia, etc.) - versões simplificadas
        function obterSaudacao() {
            const hora = new Date().getHours();
            if (hora >= 6 && hora < 12) return 'Bom dia';
            if (hora >= 12 && hora < 18) return 'Boa tarde';
            return 'Boa noite';
        }

        function obterTratamento(nome) {
            const nomesFemininos = ['MARIA', 'ANA', 'FRANCISCA', 'ANTONIA', 'ADRIANA', 'JULIANA', 'MARCIA', 'FERNANDA', 'PATRICIA', 'ALINE', 'CLAUDIA', 'CRISTINA', 'SANDRA', 'MONICA', 'DEBORA', 'LUCIANA', 'CARLA', 'ANDREA', 'ROSANA', 'SIMONE'];
            const primeiroNome = nome.toUpperCase().split(' ')[0];
            
            if (nomesFemininos.includes(primeiroNome) || (primeiroNome.endsWith('A') && !primeiroNome.endsWith('MA'))) {
                return 'Sra.';
            }
            return 'Sr.';
        }

        function showToast(message = 'Copiado!', duration = 1500) {
            const toast = document.getElementById('toastCopy');
            if (!toast) return;
            
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        async function copyToClipboard(text, element = null) {
            try {
                await navigator.clipboard.writeText(text);
                showToast('Copiado!');
            } catch (err) {
                console.error('Erro ao copiar:', err);
                showToast('Erro ao copiar', 2000);
            }
        }

        // FUNÇÃO MELHORADA DE RENDERIZAÇÃO COM CONTROLE DE SCROLL
        function renderizarProdutos(produtos) {
            const container = document.getElementById('produtosContainer');
            
            if (!produtos || produtos.length === 0) {
                container.innerHTML = '<div class="sem-dados">Nenhum produto em uso contínuo encontrado</div>';
                container.classList.remove('has-scroll');
                return;
            }

            container.innerHTML = '';

            produtos.forEach((produto, index) => {
                const diasUrgente = produto.dias_sem_compras > 30 ? 'urgente' : '';
                
                const produtoItem = document.createElement('div');
                produtoItem.className = 'produto-item';
                produtoItem.setAttribute('data-index', index);
                
                const produtoInfo = document.createElement('div');
                produtoInfo.className = 'produto-info';
                
                const nomeElement = document.createElement('div');
                nomeElement.className = 'produto-nome';
                nomeElement.textContent = produto.nome;
                nomeElement.title = 'Clique para copiar o nome do produto';
                nomeElement.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(produto.nome, nomeElement);
                });
                
                const eanElement = document.createElement('div');
                eanElement.className = 'produto-ean';
                eanElement.textContent = `EAN: ${produto.ean}`;
                eanElement.title = 'Clique para copiar o código de barras';
                eanElement.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(produto.ean, eanElement);
                });
                
                produtoInfo.appendChild(nomeElement);
                produtoInfo.appendChild(eanElement);
                
                const diasBadge = document.createElement('div');
                diasBadge.className = `dias-sem-compra ${diasUrgente}`;
                diasBadge.textContent = `${produto.dias_sem_compras}d`;
                
                produtoItem.appendChild(produtoInfo);
                produtoItem.appendChild(diasBadge);
                container.appendChild(produtoItem);
            });

            // CONTROLE DE SCROLL MELHORADO
            setTimeout(() => {
                const needsScroll = container.scrollHeight > container.clientHeight;
                
                if (needsScroll) {
                    container.classList.add('has-scroll');
                    updateDebug(`${produtos.length} produtos - scroll ativo`);
                } else {
                    container.classList.remove('has-scroll');
                    updateDebug(`${produtos.length} produtos - sem scroll`);
                }
                
                container.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
                
                console.log(`Produtos renderizados: ${produtos.length}, Scroll necessário: ${needsScroll}`);
            }, 100);
        }

        async function inicializar(cpf) {
            cpfCliente = cpf;
            updateDebug(`Inicializando CPF: ${cpf}`);
            
            try {
                if (!window.electronAPI) {
                    throw new Error('electronAPI não disponível');
                }
                
                // BUSCA PARALELA (mais rápido)
                const [clienteData, produtos] = await Promise.all([
                    window.electronAPI.buscarClientePorCpf(cpf),
                    window.electronAPI.buscarProdutosUsoContinuo(cpf)
                ]);
                
                nomeCliente = clienteData?.nome || 'Cliente';
                const saudacao = obterSaudacao();
                const tratamento = obterTratamento(nomeCliente);
                document.getElementById('saudacao').textContent = `${saudacao}, ${tratamento} ${nomeCliente}`;
                
                renderizarProdutos(produtos);
                
                updateDebug(`${produtos.length} produtos carregados`);
                
            } catch (error) {
                console.error('Erro ao inicializar popup:', error);
                updateDebug(`Erro: ${error.message}`);
                document.getElementById('saudacao').textContent = 'Erro ao carregar dados';
                document.getElementById('produtosContainer').innerHTML = 
                    `<div class="sem-dados">Erro: ${error.message}</div>`;
            }
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            updateDebug('DOM carregado');
            
            // Botão fechar normal
            const btnFechar = document.getElementById('btnFechar');
            btnFechar.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                console.log('Botão fechar clicado');
                fecharPopup('botao');
            });
            
            // BOTÃO FORCE CORRIGIDO
            const btnDebug = document.getElementById('btnDebug');
            btnDebug.addEventListener('click', async (e) => {
                e.preventDefault();
                e.stopPropagation();
                console.log('Botão Force clicado');
                
                // Tentar debug primeiro, se falhar, forçar fechamento
                try {
                    await debugCache();
                    // Aguardar 2 segundos e depois forçar fechamento
                    setTimeout(() => {
                        forcarFechamento();
                    }, 2000);
                } catch (error) {
                    console.error('Erro no debug, forçando fechamento:', error);
                    forcarFechamento();
                }
            });

            // Receber CPF via IPC
            if (window.electronAPI && window.electronAPI.onInicializarPopup) {
                window.electronAPI.onInicializarPopup((cpf) => {
                    console.log(`CPF recebido via IPC: ${cpf}`);
                    inicializar(cpf);
                });
            }
            
            updateDebug('Event listeners configurados');
        });

        // Múltiplas formas de fechar
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                console.log('ESC pressionado');
                fecharPopup('esc');
            }
        });

        // Fechar clicando no overlay (opcional)
        document.getElementById('closeOverlay').addEventListener('click', () => {
            console.log('Overlay clicado');
            fecharPopup('overlay');
        });

        console.log('Popup carregado - versão com botão Force corrigido');
        updateDebug('Popup carregado');
    </script>
</body>
</html>
